<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Echo Tower</title>
<style>
  :root { --bg:#14131a; --panel:#1e1c26; --line:#3a3648; --text:#d8d4e2; --dim:#8b86a0;
          --orange:#ff9b3d; --blue:#4da3ff; --yellow:#ffd54d; --silver:#b8c6d9; --bad:#ff6b6b; --good:#6bdc8c; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:Georgia,'Times New Roman',serif; }
  h1,h2,h3 { font-weight:normal; letter-spacing:1px; }
  button { background:#2b2836; color:var(--text); border:1px solid var(--line); border-radius:6px;
           padding:6px 12px; cursor:pointer; font-family:inherit; font-size:14px; }
  button:hover { background:#38344a; }
  button:disabled { opacity:.4; cursor:default; }
  button.big { font-size:18px; padding:14px 26px; }
  input,select { background:#2b2836; color:var(--text); border:1px solid var(--line); border-radius:6px; padding:8px; font-family:inherit; font-size:15px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; margin:10px; }
  .dim { color:var(--dim); font-size:13px; }
  .center { text-align:center; }
  #toasts { position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:50; width:min(640px,92vw); }
  .toast { background:#2e2a3e; border:1px solid var(--yellow); border-radius:8px; padding:10px 14px; margin-bottom:8px;
           box-shadow:0 4px 18px rgba(0,0,0,.5); animation:fadein .3s; }
  @keyframes fadein { from{opacity:0; transform:translateY(-8px);} to{opacity:1;} }
  /* Echo room grid */
  .roomgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-width:760px; margin:0 auto; }
  .cell { border:1px solid var(--line); border-radius:8px; padding:8px; min-height:120px; background:#232030; }
  .cell .poslabel { color:var(--dim); font-size:12px; letter-spacing:2px; }
  .cell.grated { background:repeating-linear-gradient(45deg,#232030,#232030 8px,#2a2438 8px,#2a2438 10px); }
  .cell.bare { background:#1b1a22; }
  .cell.doorcell { background:#26222e; border-color:#5a5470; }
  .badge { display:inline-block; border-radius:10px; padding:1px 8px; font-size:12px; margin:2px 2px 0 0; color:#111; }
  .b-walker { background:var(--orange); } .b-blue { background:var(--blue); } .b-yellow { background:var(--yellow); }
  .stname { font-size:15px; margin:4px 0; }
  .cell button { font-size:12px; padding:4px 8px; margin:2px 2px 0 0; }
  #echoMsg { min-height:44px; font-style:italic; color:#cbb98a; }
  /* Loom */
  .loomwrap { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
  svg text { user-select:none; }
  .candlerow { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
  .candle { width:46px; height:64px; border:1px solid var(--line); border-radius:8px; background:#242131;
            display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; position:relative; }
  .candle .flame { width:14px; height:14px; border-radius:50%; background:#333; margin-bottom:6px; transition:all .25s; }
  .candle.lit-orange .flame { background:var(--orange); box-shadow:0 0 14px var(--orange); }
  .candle.lit-blue   .flame { background:var(--blue);   box-shadow:0 0 14px var(--blue); }
  .candle.lit-yellow .flame { background:var(--yellow); box-shadow:0 0 14px var(--yellow); }
  .candle.hiddenc { opacity:.15; }
  .candle.snuffable { cursor:pointer; outline:2px dashed var(--silver); }
  .candle .num { font-size:11px; color:var(--dim); }
  .mural { font-style:italic; line-height:1.7; }
  .facerow { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  /* Admin */
  .admincols { display:flex; flex-wrap:wrap; align-items:flex-start; }
  .admincols > div { flex:1 1 380px; min-width:340px; }
  table { border-collapse:collapse; font-size:13px; }
  td,th { border:1px solid var(--line); padding:3px 8px; text-align:left; }
  .ok { color:var(--good); } .no { color:var(--bad); }
  pre { background:#171520; border:1px solid var(--line); border-radius:6px; padding:8px; font-size:12px; overflow:auto; max-height:220px; }
  .logbox { max-height:260px; overflow:auto; font-size:12px; font-family:monospace; }
  #victory { position:fixed; inset:0; background:rgba(8,6,14,.92); z-index:100; display:flex; align-items:center;
             justify-content:center; flex-direction:column; text-align:center; padding:20px; }
</style>
</head>
<body>
<div id="toasts"></div>
<div id="screen"></div>

<script>
'use strict';
const $ = (sel, el) => (el||document).querySelector(sel);
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let NAME = localStorage.getItem('et_name') || '';
let VIEW = null;
let es = null;
let snuffMode = false;

async function api(action, data) {
  const r = await fetch('/api', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({ action, name: NAME }, data || {})) });
  const out = await r.json();
  if (out.error) showToast(out.error);
  return out;
}

function showToast(msg, ms) {
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = msg;
  $('#toasts').appendChild(d);
  setTimeout(() => d.remove(), ms || 7000);
}

function connect() {
  if (es) es.close();
  es = new EventSource('/events?name=' + encodeURIComponent(NAME));
  es.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === 'state') { VIEW = m.view; render(); }
    else if (m.type === 'toast') showToast(m.msg, 10000);
    else if (m.type === 'flicker') doFlickers(m.items);
  };
}

function doFlickers(items) {
  items.forEach((it, k) => {
    setTimeout(() => {
      document.querySelectorAll('.candle[data-idx="' + it.idx + '"]').forEach(el => {
        el.classList.add('lit-' + it.color);
        setTimeout(() => { if (!el.dataset.stayLit || el.dataset.stayColor !== it.color) el.classList.remove('lit-' + it.color); render(); }, 900);
      });
    }, k * 500);
  });
}

// ------------------------------------------------------------- rendering
function render() {
  const root = $('#screen');
  if (!NAME) { root.innerHTML = landingHTML(); wireLanding(); return; }
  if (!VIEW) { root.innerHTML = '<div class="panel center">Connecting…</div>'; return; }
  if (VIEW.screen === 'choose') { root.innerHTML = chooseHTML(); wireChoose(); return; }
  if (VIEW.screen === 'echo')  { root.innerHTML = headerHTML('The Echo') + '<div id="echoRoot"></div>'; renderEcho(VIEW.echo, $('#echoRoot')); return; }
  if (VIEW.screen === 'loom')  { root.innerHTML = headerHTML('The Loom') + '<div id="loomRoot"></div>'; renderLoom(VIEW.loom, $('#loomRoot')); return; }
  if (VIEW.screen === 'admin') { renderAdmin(root); return; }
}

function headerHTML(place) {
  return '<div class="center dim" style="padding:6px">' + esc(place) + ' — you are <b>' + esc(NAME) +
    '</b> <a href="#" onclick="switchUser();return false" style="color:var(--dim)">(switch user)</a></div>';
}
function switchUser() { localStorage.removeItem('et_name'); NAME=''; VIEW=null; if (es) es.close(); render(); }

// ---- landing / choose
function landingHTML() {
  return '<div class="panel center" style="max-width:460px;margin:12vh auto">' +
    '<h1>\u{1F5FC} The Echo Tower</h1>' +
    '<p class="dim">Write your name. Your name is who you are — return with it and the tower remembers you.</p>' +
    '<input id="nameIn" placeholder="Your name" maxlength="24"> <button id="loginBtn" class="big">Log in</button></div>';
}
function wireLanding() {
  const go = async () => {
    const n = $('#nameIn').value.trim();
    if (!n) return;
    NAME = n; localStorage.setItem('et_name', n);
    await api('login'); connect();
  };
  $('#loginBtn').onclick = go;
  $('#nameIn').onkeydown = (e) => { if (e.key === 'Enter') go(); };
}
function chooseHTML() {
  return headerHTML('The Threshold') +
    '<div class="panel center" style="max-width:560px;margin:8vh auto">' +
    '<h2>Choose your place, ' + esc(NAME) + '</h2>' +
    '<p class="dim">Once you step through, you are bound to that place until the Overseer resets the tower.</p>' +
    '<p><button class="big" id="btnEcho" ' + (VIEW.echoTaken ? 'disabled' : '') + '>\u{1F6AA} Enter the Echo</button></p>' +
    (VIEW.echoTaken ? '<p class="dim">Someone already walks the Echo.</p>' : '<p class="dim">The Walker. Only one may enter.</p>') +
    '<p><button class="big" id="btnLoom">\u{1F56F}\u{FE0F} Enter the Loom</button></p><p class="dim">The Readers. Any number may enter.</p>' +
    '<p><button class="big" id="btnAdmin">\u{1F441}\u{FE0F} Overseer</button></p><p class="dim">Requires the password.</p></div>';
}
function wireChoose() {
  $('#btnEcho').onclick = () => api('choose', { role: 'echo' });
  $('#btnLoom').onclick = () => api('choose', { role: 'loom' });
  $('#btnAdmin').onclick = () => {
    const pw = prompt('Overseer password:');
    if (pw !== null) api('choose', { role: 'admin', password: pw });
  };
}

// ---- echo (walker)
let echoMsg = '';
function badgeHTML(v, pos) {
  let h = '';
  if (v.walkerHold === pos) h += '<span class="badge b-walker">YOU (holding)</span>';
  if (v.mimes.blue.present && v.mimes.blue.holding === pos) h += '<span class="badge b-blue">blue mime</span>';
  if (v.mimes.yellow.present && v.mimes.yellow.holding === pos) h += '<span class="badge b-yellow">golden mime</span>';
  return h;
}
function cellHTML(v, pos) {
  const p = v.positions.find(x => x.pos === pos);
  let cls = 'cell', body = '';
  if (!p.station) {
    cls += ' bare';
    body = '<div class="stname dim">bare stone</div>' +
      '<button data-act="gesture" data-pos="' + pos + '" data-kind="touch">Grasp at the air</button>';
  } else if (p.grated) {
    cls += ' grated';
    body = '<div class="stname">' + esc(p.station) + ' <span class="dim">[behind an iron grate]</span></div>' +
      '<button data-act="gesture" data-pos="' + pos + '" data-kind="touch">Reach for it (blocked)</button>';
  } else {
    body = '<div class="stname">' + esc(p.station) + '</div>' +
      '<button data-act="gesture" data-pos="' + pos + '" data-kind="touch">Touch briefly</button>' +
      '<button data-act="gesture" data-pos="' + pos + '" data-kind="hold">Hold</button>';
  }
  return '<div class="' + cls + '"><div class="poslabel">' + pos + '</div>' + body + '<div>' + badgeHTML(v, pos) + '</div></div>';
}
function renderEcho(v, root) {
  if (v.solved) { root.innerHTML = victoryHTML(); return; }
  const centerCell =
    '<div class="cell" style="background:#1a1822"><div class="poslabel">YOU</div>' +
    '<div class="stname">' + (v.walkerHold ? 'Holding: <b>' + esc(v.walkerHold) + '</b>' : '<span class="dim">Hands free</span>') + '</div>' +
    (v.walkerHold ? '<button data-act="release">Let go</button>' : '') +
    '<div style="margin-top:6px">' +
    (v.mimes.blue.present ? '<span class="badge b-blue">blue mime' + (v.mimes.blue.holding ? ' @ ' + v.mimes.blue.holding : ': idle') + '</span>' : '<span class="dim">no shadows yet</span>') +
    (v.mimes.yellow.present ? '<span class="badge b-yellow">golden mime' + (v.mimes.yellow.holding ? ' @ ' + v.mimes.yellow.holding : ': idle') + '</span>' : '') +
    '</div></div>';
  const doorCell =
    '<div class="cell doorcell"><div class="poslabel">S — DOOR</div>' +
    '<button data-act="door" data-which="south">Step through the south door</button>' +
    (v.mirrorUnlocked ? '<button data-act="door" data-which="silver" style="border-color:var(--silver);color:var(--silver)">Step through the SILVER door</button>' : '') +
    '</div>';
  root.innerHTML =
    '<div class="panel center"><h2>' + v.glyph + ' The ' + esc(v.room) + ' Room</h2><p class="dim">' + esc(v.desc) + '</p></div>' +
    '<div class="roomgrid">' +
      cellHTML(v, 'NW') + cellHTML(v, 'N') + cellHTML(v, 'NE') +
      cellHTML(v, 'W') + centerCell + cellHTML(v, 'E') +
      '<div class="cell bare" style="visibility:hidden"></div>' + doorCell + '<div class="cell bare" style="visibility:hidden"></div>' +
    '</div>' +
    '<div class="panel" style="max-width:760px;margin:10px auto"><div id="echoMsg">' + esc(echoMsg) + '</div></div>';
  root.querySelectorAll('button[data-act]').forEach(b => {
    b.onclick = async () => {
      const a = b.dataset.act;
      let out;
      if (a === 'gesture') out = await api('gesture', { pos: b.dataset.pos, kind: b.dataset.kind });
      else if (a === 'release') out = await api('release');
      else if (a === 'door') out = await api('door', { which: b.dataset.which });
      if (out && out.ok) {
        echoMsg = (out.message || '') + (out.narration ? ' ' + out.narration.join(' ') : '');
        const el = $('#echoMsg'); if (el) el.textContent = echoMsg;
      }
    };
  });
}
function victoryHTML() {
  return '<div id="victory"><h1>✨ The mirror dissolves ✨</h1>' +
    '<p style="max-width:520px">Behind the glass: a round room full of candlelight, four statues, and your friends. The Loom was behind the mirror all along.</p>' +
    '<h2>The Echo Tower is solved.</h2></div>';
}

// ---- loom (readers)
function pt(cx, cy, r, angleDeg) {
  const a = angleDeg * Math.PI / 180;
  return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
}
function loomSVG(v) {
  const cx = 210, cy = 210, R = 150;
  let s = '<svg width="420" height="420" viewBox="0 0 420 420">';
  s += '<circle cx="' + cx + '" cy="' + cy + '" r="180" fill="none" stroke="#3a3648"/>';
  s += '<circle cx="' + cx + '" cy="' + cy + '" r="120" fill="none" stroke="#2c2938" stroke-dasharray="3 6"/>';
  for (let i = 0; i < 24; i++) {
    const [x1, y1] = pt(cx, cy, 172, i * 15), [x2, y2] = pt(cx, cy, 180, i * 15);
    s += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#3a3648"/>';
  }
  if (v.beamAngle !== null) {
    const [bx, by] = pt(cx, cy, R, v.beamAngle);
    s += '<line x1="' + cx + '" y1="' + cy + '" x2="' + bx + '" y2="' + by + '" stroke="#7fe7ff" stroke-width="4" opacity="0.85"/>';
  }
  s += '<circle cx="' + cx + '" cy="' + cy + '" r="26" fill="#242131" stroke="#3a3648"/>' +
       '<text x="' + cx + '" y="' + (cy + 5) + '" text-anchor="middle" font-size="13" fill="#8b86a0">table</text>';
  for (const st of v.statues) {
    const [x, y] = pt(cx, cy, R, st.angle);
    if (st.facing) {
      let tx, ty;
      if (st.facing === 'Center') { [tx, ty] = [cx, cy]; }
      else { const t = v.statues.find(z => z.room === st.facing); [tx, ty] = t ? pt(cx, cy, R, t.angle) : [cx, cy]; }
      const dx = tx - x, dy = ty - y, len = Math.hypot(dx, dy) || 1;
      s += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + dx / len * 34) + '" y2="' + (y + dy / len * 34) + '" stroke="#a99ad0" stroke-width="3"/>';
    }
    s += '<g class="statue" data-room="' + st.room + '" style="cursor:pointer">' +
      '<circle cx="' + x + '" cy="' + y + '" r="24" fill="#2b2836" stroke="' + (st.eyesGlow ? '#ffd54d' : '#55506a') + '" stroke-width="' + (st.eyesGlow ? 5 : 2) + '"/>' +
      '<text x="' + x + '" y="' + (y + 6) + '" text-anchor="middle" font-size="18">' + st.glyph + '</text>' +
      '<text x="' + x + '" y="' + (y + 38) + '" text-anchor="middle" font-size="10" fill="' + (st.eyesGlow ? '#ffd54d' : '#8b86a0') + '">' +
        (st.eyesOpen ? (st.eyesGlow ? 'eyes GLOW' : 'eyes open') : 'eyes shut') + '</text></g>';
  }
  s += '</svg>';
  return s;
}
function renderLoom(v, root) {
  if (v.solved) { root.innerHTML = victoryHTML(); return; }
  const glyphOf = (r) => (v.statues.find(s => s.room === r) || {}).glyph || r;
  const faceSel = (st) => {
    const opts = ['', 'Bell', 'Flame', 'Chain', 'Mirror', 'Center'].map(o =>
      '<option value="' + o + '"' + (st.facing === o ? ' selected' : '') + '>' +
      (o === '' ? '—' : o === 'Center' ? 'the table (center)' : 'statue ' + glyphOf(o)) + '</option>').join('');
    return '<label class="dim">' + st.glyph + ' faces <select data-statue="' + st.room + '">' + opts + '</select></label>';
  };
  root.innerHTML =
    '<div class="loomwrap">' +
    '<div class="panel center" style="flex:0 0 460px">' +
      '<h3>The great ring <span class="dim">(click a statue to aim the beam)</span></h3>' + loomSVG(v) +
      '<div class="dim">Clock: <b>' + v.clockNotches + ' / 24</b> door-passages this turn. The ring grinds one notch with every door.</div>' +
      '<div class="facerow">' + v.statues.map(faceSel).join('') + '</div>' +
    '</div>' +
    '<div style="flex:1 1 380px;max-width:560px">' +
      '<div class="panel"><h3>The candle table</h3>' +
        '<div class="candlerow">' + v.candles.map(c =>
          c.hidden ? '<div class="candle hiddenc" data-idx="' + c.i + '"><div class="flame"></div><div class="num">—</div></div>' :
          '<div class="candle' + (c.lit ? ' lit-' + c.color : '') + (snuffMode ? ' snuffable' : '') + '" data-idx="' + c.i + '" ' +
          (c.lit ? 'data-stay-lit="1" data-stay-color="' + c.color + '"' : '') + '><div class="flame"></div><div class="num">' + (c.i + 1) + '</div></div>').join('') +
        '</div>' +
        '<div class="center" style="margin-top:8px"><button id="snuffBtn" ' + (v.rewindAvailable ? '' : 'disabled') + '>' +
          (snuffMode ? 'Cancel — click a candle to snuff && relight it' : 'Snuff && relight a candle (once per visit)') + '</button></div>' +
        '<p class="dim center">Flames: <span style="color:var(--orange)">orange = the living</span> · <span style="color:var(--blue)">blue = the first shadow</span> · <span style="color:var(--yellow)">yellow = the second shadow</span></p>' +
      '</div>' +
      '<div class="panel"><h3>The mural — only one arc is lit</h3>' +
        '<div class="mural"><b>' + esc(v.mural.title) + '</b><br>' + v.mural.lines.map(esc).join('<br>') + '</div>' +
        '<p class="dim">The other arcs lie in shadow. They light only when the Walker stands in their room.</p>' +
      '</div>' +
      '<div class="panel dim">In the Loom: ' + v.loomPlayers.map(esc).join(', ') +
        (v.yellowAwake ? ' · <span style="color:var(--yellow)">the second shadow is awake</span>' : '') +
        (v.mirrorUnlocked ? ' · <span style="color:var(--silver)">the silver doors stand open</span>' : '') + '</div>' +
    '</div></div>';
  root.querySelectorAll('.statue').forEach(g => { g.onclick = () => api('aimBeam', { room: g.dataset.room }); });
  root.querySelectorAll('select[data-statue]').forEach(sel => {
    sel.onchange = () => { if (sel.value) api('faceStatue', { statue: sel.dataset.statue, target: sel.value }); };
  });
  const sb = $('#snuffBtn', root);
  if (sb) sb.onclick = () => { snuffMode = !snuffMode; render(); };
  if (snuffMode) root.querySelectorAll('.candle:not(.hiddenc)').forEach(c => {
    c.onclick = async () => { snuffMode = false; const out = await api('snuffCandle', { idx: +c.dataset.idx }); if (out.message) showToast(out.message); };
  });
}

// ---- admin
function renderAdmin(root) {
  const a = VIEW.admin;
  const scr = (s) => (s === null ? '<i class="dim">none</i>' : s.length ? s.join(' → ') : '<i class="dim">(empty)</i>');
  root.innerHTML = headerHTML('Overseer') +
    '<div class="panel"><b>Tools:</b> ' +
      '<button id="tReset">RESET PUZZLE</button> ' +
      '<button id="tYellow"' + (a.yellowAwake ? ' disabled' : '') + '>Force: wake Yellow</button> ' +
      '<button id="tMirror"' + (a.mirrorUnlocked ? ' disabled' : '') + '>Force: unlock Mirror</button> ' +
      '<button id="tSolve"' + (a.solved ? ' disabled' : '') + '>Force: solve</button> ' +
      '<button id="tWipe">Wipe scripts</button> ' +
      '<button id="tClock">Set clock…</button> ' +
      'Teleport walker: <select id="tRoomSel"><option>Bell</option><option>Flame</option><option>Chain</option><option>Mirror</option></select> <button id="tTele">Go</button>' +
    '</div>' +
    '<div class="admincols">' +
      '<div><h3 class="center">Echo view (live, you can act)</h3><div id="aEcho"></div></div>' +
      '<div><h3 class="center">Loom view (live, you can act)</h3><div id="aLoom"></div></div>' +
      '<div><div class="panel"><h3>State</h3>' +
        '<p>Goals: Yellow <b class="' + (a.yellowAwake ? 'ok">AWAKE' : 'no">asleep') + '</b> · Mirror <b class="' + (a.mirrorUnlocked ? 'ok">UNLOCKED' : 'no">locked') + '</b> · <b class="' + (a.solved ? 'ok">SOLVED' : 'no">unsolved') + '</b></p>' +
        '<p>Walker: <b>' + esc(a.walker.room) + '</b>, holding <b>' + esc(a.walker.hold || '—') + '</b><br>' +
        'Beam: ' + (a.beamAngle === null ? '<i class="dim">unaimed</i>' : a.beamAngle + '° → <b>' + (a.beamTarget || 'nothing (mis-aimed!)') + '</b>') +
        ' · Clock: <b>' + a.clockNotches + '/24</b> · rewind ' + (a.rewindUsed ? 'used' : 'available') + '</p>' +
        '<p><b>Scripts</b><br>current room: ' + scr(a.scripts.current) + '<br>BLUE (1 room ago): ' + scr(a.scripts.blue) + '<br>YELLOW (2 rooms ago): ' + scr(a.scripts.yellow) + '</p>' +
        '<p><b>Holds:</b> ' + (Object.keys(a.holds).length ? Object.entries(a.holds).map(([p, w]) => p + ':' + w.join('+')).join(' · ') : '<i class="dim">none</i>') + '</p>' +
        '<p><b>Statue alignment</b> (goal 1 needs all ✓): overall <b class="' + (a.aligned ? 'ok">ALIGNED' : 'no">not aligned') + '</b></p>' +
        '<table><tr><th>statue</th><th>faces</th><th>required</th><th></th></tr>' +
          a.statues.map(s => '<tr><td>' + s.statue + '</td><td>' + esc(s.facing || '—') + '</td><td>' + esc(s.required || 'unknowable yet') + '</td><td class="' + (s.ok ? 'ok">✓' : 'no">✗') + '</td></tr>').join('') +
        '</table>' +
        '<p><b>Route:</b> <span class="dim">' + a.routeHistory.slice(-14).join(' → ') + '</span></p>' +
        '<p><b>Candle map (secret!):</b></p><pre>' + a.candleOrder.map((c, i) => (i + 1) + ': ' + c.room + '-' + c.pos).join('\n') + '</pre>' +
        '<p><b>Players</b></p><table><tr><th>name</th><th>place</th><th></th></tr>' +
          a.players.map(p => '<tr><td>' + esc(p.name) + '</td><td>' + esc(p.role || '—') + '</td><td>' +
            (p.role && p.role !== 'admin' ? '<button data-free="' + esc(p.name) + '">free</button>' : '') + '</td></tr>').join('') +
        '</table>' +
        '<p><b>Log</b></p><div class="logbox">' + a.log.map(l => esc(l.t) + '  ' + esc(l.msg)).join('<br>') + '</div>' +
      '</div></div>' +
    '</div>';
  renderEcho(VIEW.echo, $('#aEcho'));
  renderLoom(VIEW.loom, $('#aLoom'));
  $('#tReset').onclick = () => { if (confirm('Reset the whole puzzle and free all players?')) api('reset'); };
  $('#tYellow').onclick = () => api('wakeYellow');
  $('#tMirror').onclick = () => api('unlockMirror');
  $('#tSolve').onclick = () => api('forceSolve');
  $('#tWipe').onclick = () => api('wipeScripts');
  $('#tClock').onclick = () => { const n = prompt('Clock notches (0–24):', '0'); if (n !== null) api('setClock', { n: +n }); };
  $('#tTele').onclick = () => api('teleport', { room: $('#tRoomSel').value });
  root.querySelectorAll('button[data-free]').forEach(b => { b.onclick = () => api('freeRole', { target: b.dataset.free }); });
}

// ------------------------------------------------------------- boot
if (NAME) { api('login').then(() => connect()); }
render();
</script>
</body>
</html>
